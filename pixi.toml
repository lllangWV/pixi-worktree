[workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]
preview = ["pixi-build"]

# Conda packaging for pixi-worktree. The `pkg` environment isolates
# rattler-build so it doesn't enter any default solve. Run with
# `pixi run -e pkg <task>`.
#
# Credentials: rattler-build's prefix.dev upload reads PREFIX_API_KEY or its own
# auth store at ~/.rattler/credentials.json. Authenticate once with the
# channel-auth task for local publishes (see docs/publishing.md).
#
# Set the destination channel via PREFIX_CHANNEL.

[dependencies]

[feature.pkg.dependencies]
rattler-build = ">=0.40"

[feature.pkg.activation.env]
PREFIX_CHANNEL = "wv-forge"
PREFIX_SERVER_URL = "https://prefix.dev"

[feature.pkg.tasks]
channel-auth = "bash scripts/channel-auth.sh"
build = "rattler-build build --recipe recipe/recipe.yaml --output-dir output"
publish = { cmd = "rattler-build upload prefix --channel \"$PREFIX_CHANNEL\" --url \"$PREFIX_SERVER_URL\" --skip-existing output/noarch/pixi-worktree-*.conda", depends-on = ["build"] }

[environments]
pkg = { features = ["pkg"], no-default-feature = true }
