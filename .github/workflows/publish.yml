name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PREFIX_CHANNEL: wv-forge
  PREFIX_SERVER_URL: https://prefix.dev

jobs:
  publish:
    name: Build and publish conda package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        uses: prefix-dev/rattler-build-action@v0.2.38
        with:
          recipe-path: recipe/recipe.yaml
          upload-artifact: true

      - name: Publish to prefix.dev
        shell: bash
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${PREFIX_API_KEY}" ]; then
            echo "Missing PREFIX_API_KEY secret." >&2
            exit 1
          fi

          shopt -s nullglob
          packages=(output/noarch/pixi-worktree-*.conda output/noarch/pixi-worktree-*.tar.bz2)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No pixi-worktree packages found in output/noarch." >&2
            exit 1
          fi

          rattler-build upload prefix \
            --channel "${PREFIX_CHANNEL}" \
            --url "${PREFIX_SERVER_URL}" \
            --skip-existing \
            "${packages[@]}"
