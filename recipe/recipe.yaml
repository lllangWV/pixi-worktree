# Recipe for pixi-worktree — generic git-worktree provisioning CLI.
# Source is the repo root (this recipe lives in recipe/). Built from the local
# working tree via a path source — no clone, no credentials needed.

context:
  version: "0.1.0"

package:
  name: pixi-worktree
  version: ${{ version }}

source:
  # Repo root, one level up from this recipe (recipe/ -> repo root).
  # use_gitignore (default true) keeps .pixi/, output/ and other ignored paths
  # out of the copied build tree.
  path: ..

build:
  number: 0
  noarch: generic
  script:
    content: |
      mkdir -p "${PREFIX}/bin" "${PREFIX}/etc/conda/activate.d"
      install -m 0755 pixi-worktree "${PREFIX}/bin/pixi-worktree"
      install -m 0644 activate.d/pixi-worktree.sh "${PREFIX}/etc/conda/activate.d/pixi-worktree.sh"

requirements:
  run:
    - git
    - bash

tests:
  - script:
      - pixi-worktree version
      - pixi-worktree help

about:
  homepage: https://github.com/lllangWV/pixi-worktree
  license: MIT
  license_file: LICENSE
  summary: Generic, tool-agnostic git-worktree provisioning (post-checkout hook installer)
  repository: https://github.com/lllangWV/pixi-worktree

extra:
  recipe-maintainers:
    - lllangWV
